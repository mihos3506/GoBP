<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ GoBP Graph Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-panel: rgba(15,15,22,0.92);
    --border: rgba(255,193,7,0.14);
    --border-strong: rgba(255,193,7,0.35);
    --text: #e8e8ee;
    --text-dim: #8a8a95;
    --text-fade: #4a4a55;
    --amber: #ffc107;
    --amber-soft: rgba(255,193,7,0.7);
    --mono: 'Courier New', ui-monospace, monospace;
    --serif: Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', system-ui, sans-serif;
    font-size: 14px; line-height: 1.5; font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  #graph-canvas { position: fixed; inset: 0; z-index: 1; }

  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 24px 10px; background: linear-gradient(180deg, var(--bg) 40%, transparent); pointer-events: none; display: flex; align-items: baseline; gap: 12px; }
  #header h1 { font-family: var(--serif); font-weight: 300; font-size: 20px; pointer-events: auto; }
  #header h1 .r { color: var(--amber); font-weight: 500; margin-right: 6px; }
  #header h1 em { font-style: italic; color: var(--amber-soft); font-size: 0.65em; margin-left: 6px; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--mono); }
  #project-switcher { pointer-events: auto; background: transparent; border: 1px solid var(--border); color: var(--amber-soft); font-family: var(--mono); font-size: 11px; padding: 4px 8px; cursor: pointer; outline: none; }
  #project-switcher:focus { border-color: var(--border-strong); }

  #controls { position: fixed; top: 56px; left: 16px; z-index: 10; width: 220px; background: var(--bg-panel); backdrop-filter: blur(16px); border: 1px solid var(--border); padding: 14px 16px; max-height: calc(100vh - 80px); overflow-y: auto; color: #c9b99a; }
  #controls section { margin-bottom: 16px; }
  #controls.sidebar {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
    font-size: 13px;
    line-height: 1.6;
  }
  .sidebar-section-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #636d83;
    margin: 16px 8px 6px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }
  #controls section:first-child .sidebar-section-title { margin-top: 0; }
  #controls h3.sidebar-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; }
  #controls label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text); padding: 2px 0; cursor: pointer; user-select: none; }
  #controls label:hover { color: var(--amber); }
  #controls input[type="checkbox"] { appearance: none; width: 10px; height: 10px; border: 1px solid var(--text-dim); background: transparent; cursor: pointer; flex-shrink: 0; position: relative; }
  #controls input[type="checkbox"]:checked { background: var(--amber); border-color: var(--amber); }
  #controls .count { margin-left: auto; font-size: 9px; color: var(--text-fade); }
  #controls input[type="text"] { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 0; outline: none; }
  #controls input[type="text"]:focus { border-bottom-color: var(--amber); }
  #controls input[type="text"]::placeholder { color: var(--text-fade); }
  #controls button { background: transparent; border: 1px solid var(--border-strong); color: var(--amber); font-family: var(--mono); font-size: 9px; padding: 5px 8px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s; margin-right: 4px; margin-bottom: 4px; }
  #controls button:hover { background: var(--amber); color: var(--bg); }

  #detail { position: fixed; top: 56px; right: 16px; z-index: 10; width: 300px; background: var(--bg-panel); backdrop-filter: blur(16px); border: 1px solid var(--border); padding: 16px 18px; max-height: calc(100vh - 80px); overflow-y: auto; display: none; }
  #detail.visible { display: block; }
  #detail .close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; }
  #detail .close:hover { color: var(--amber); }
  #detail .node-type { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: #f0883e; margin-bottom: 4px; }
  #detail .node-id { font-size: 9px; color: var(--text-fade); margin-bottom: 8px; word-break: break-all; }
  #detail .node-name { font-family: var(--serif); font-size: 17px; font-weight: 300; color: var(--text); line-height: 1.3; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  #detail .field { margin-bottom: 8px; }
  #detail .field-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-dim); margin-bottom: 2px; }
  #detail .field-value { font-size: 11px; color: var(--text); line-height: 1.5; word-break: break-word; }
  #detail .relations { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  #detail .relations h4 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--amber-soft); margin-bottom: 6px; }
  #detail .rel-item { font-size: 10px; padding: 2px 0; color: var(--text-dim); display: flex; gap: 6px; cursor: pointer; }
  #detail .rel-item:hover .rel-target { color: var(--amber); }
  #detail .rel-verb { color: var(--text-fade); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; min-width: 70px; flex-shrink: 0; }
  #detail .rel-target { color: var(--text); }

  .v2-breadcrumb { font-size: 10px; color: var(--amber-soft); margin-bottom: 10px; letter-spacing: 0.06em; }
  .v2-breadcrumb a { color: var(--amber); cursor: pointer; text-decoration: none; border-bottom: 1px dotted rgba(255,193,7,0.35); }
  .v2-breadcrumb a:hover { color: #fff; }
  .v2-type { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em; color: var(--amber-soft); margin-bottom: 4px; }
  .v2-type-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .v2-type-row .v2-type { margin-bottom: 0; }
  .v2-title { font-family: var(--serif); font-size: 17px; font-weight: 300; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .v2-meta { font-size: 10px; color: var(--text-dim); margin-bottom: 12px; }
  .v2-section { margin: 14px 0; padding-top: 10px; border-top: 1px solid var(--border); }
  .v2-h { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #8b949e; margin-bottom: 6px; }
  .v2-desc-info { font-size: 11px; line-height: 1.55; color: var(--text); white-space: pre-wrap; }
  .v2-code { font-size: 10px; background: rgba(0,0,0,0.35); border: 1px solid var(--border); padding: 10px; margin-top: 8px; white-space: pre-wrap; color: var(--text-dim); }
  .v2-rel { font-size: 10px; margin: 4px 0; color: var(--text-dim); }
  .v2-rel-verb { color: var(--amber-soft); text-transform: uppercase; font-size: 9px; letter-spacing: 0.08em; }
  .v2-raw { font-size: 9px; background: rgba(0,0,0,0.25); padding: 8px; max-height: 180px; overflow: auto; white-space: pre-wrap; }
  .v2-k { font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text-fade); margin-right: 6px; }

  /* Framed blocks: prose vs code (nodes + edge reasons) */
  .detail-panel {
    margin: 12px 0;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: rgba(8, 10, 18, 0.72);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .detail-panel--code {
    border-color: rgba(255, 193, 7, 0.28);
    background: rgba(0, 0, 0, 0.4);
  }
  .detail-panel-title {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8b949e;
    margin-bottom: 8px;
  }
  .detail-panel-body--prose {
    font-size: 12px;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .detail-panel-body--code {
    margin: 0;
    padding: 0;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.45;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text-dim);
  }
  .edge-toggle {
    width: 16px;
    flex-shrink: 0;
    font-size: 10px;
    color: #636d83;
    cursor: pointer;
    user-select: none;
    transition: color 0.15s;
  }
  .edge-toggle:hover { color: #f0883e; }
  .edge-toggle--empty {
    cursor: default;
    color: #4a4a55;
  }
  .edge-toggle--empty:hover { color: #4a4a55; }

  .edge-expand {
    margin-top: 6px;
    margin-left: 22px;
    padding: 8px;
    background: #161b22;
    border-radius: 4px;
    border-left: 2px solid #30363d;
  }
  .edge-reason-text {
    font-size: 12px;
    color: #8b949e;
    line-height: 1.5;
    margin-bottom: 4px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .edge-code-block {
    font-family: 'JetBrains Mono', 'Fira Code', var(--mono);
    font-size: 11px;
    color: #e1e4e8;
    margin: 4px 0 0;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .edge-nav-hint {
    margin-top: 10px;
    font-size: 11px;
    color: #3d4450;
    font-style: italic;
    padding-top: 8px;
    border-top: 1px solid #21262d;
  }

  .detail-section { margin: 14px 0 0; padding-top: 10px; border-top: 1px solid var(--border); }
  .detail-section-title { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: #8b949e; margin-bottom: 6px; }
  .edge-item {
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
  }
  .edge-item:last-child { border-bottom: none; }
  .edge-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .edge-direction {
    font-size: 12px;
    color: #636d83;
    width: 16px;
    flex-shrink: 0;
  }
  .edge-node-name {
    font-size: 13px;
    color: #c9b99a;
    cursor: pointer;
    text-decoration: none;
  }
  .edge-node-name:hover {
    color: #f0883e;
    text-decoration: underline;
  }
  .no-edges {
    font-size: 12px;
    color: #636d83;
    font-style: italic;
  }
  .history-item {
    padding: 8px 0;
    border-bottom: 1px solid #21262d;
  }
  .history-item:last-child { border-bottom: none; }
  .history-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }
  .history-index {
    font-size: 11px;
    color: #636d83;
    font-variant-numeric: tabular-nums;
  }
  .history-date {
    font-size: 11px;
    color: #636d83;
  }
  .history-desc {
    font-size: 13px;
    color: #c9b99a;
    line-height: 1.4;
  }
  .history-code {
    margin-top: 6px;
    font-size: 11px;
  }
  .code-block {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 12px;
    font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.5;
    color: #e1e4e8;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #group-filters .gf-tree { font-size: 13px; margin-left: 0; }
  .group-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 3px 8px;
    cursor: pointer;
    user-select: none;
    border-radius: 4px;
  }
  .group-item:hover { background: rgba(255,255,255,0.05); }
  .group-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .group-count {
    min-width: 24px;
    text-align: right;
    font-size: 11px;
    color: #636d83;
    font-variant-numeric: tabular-nums;
    margin-left: 8px;
  }
  .group-dot { margin-right: 4px; opacity: 0.85; }
  /* Top-level groups (Constraint, Dev, Document...) */
  .group-level-0 .group-name {
    font-size: 13px;
    font-weight: 600;
    color: #c9b99a;
  }
  .group-level-1 .group-name {
    font-size: 12px;
    font-weight: 500;
    color: #a0a8b8;
  }
  .group-level-2 .group-name {
    font-size: 12px;
    font-weight: 400;
    color: #6e7681;
  }
  .group-item.active .group-name {
    color: #f0883e;
    font-weight: 600;
  }
  .group-item.active .group-count {
    color: #f0883e;
  }
  .all-groups-btn {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    padding: 4px 10px;
    margin-bottom: 8px;
    border-radius: 4px;
    border: 1px solid #f0883e;
    color: #f0883e;
    background: transparent;
    cursor: pointer;
  }
  .all-groups-btn:hover,
  .all-groups-btn.active {
    background: #f0883e;
    color: #0f1117;
  }

  #statusbar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 8px 24px; background: linear-gradient(0deg, var(--bg) 40%, transparent); font-size: 9px; color: var(--text-fade); letter-spacing: 0.12em; text-transform: uppercase; display: flex; justify-content: space-between; pointer-events: none; }

  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; flex-direction: column; gap: 12px; }
  #loading .r { color: var(--amber); font-size: 36px; animation: pulse 2s ease-in-out infinite; }
  #loading p { font-size: 10px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }

  #controls::-webkit-scrollbar, #detail::-webkit-scrollbar, #mcp-panel::-webkit-scrollbar { width: 3px; }
  #controls::-webkit-scrollbar-thumb, #detail::-webkit-scrollbar-thumb, #mcp-panel::-webkit-scrollbar-thumb { background: var(--border-strong); }

  #btn-mcp {
    margin-top: 4px;
    width: 100%;
    background: rgba(255,193,7,0.08);
    color: var(--amber);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
  }
  #btn-mcp:hover { background: rgba(255,193,7,0.15); }
  .mcp-field { margin-bottom: 8px; }
  .mcp-field label { display: block; color: var(--text-dim); font-size: 10px; margin-bottom: 3px; }
  .mcp-field input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 5px 8px; font-family: var(--mono); font-size: 11px; }
  .mcp-field input:focus { outline: none; border-color: var(--amber); }
  .mcp-tabs { display: flex; gap: 4px; margin-top: 12px; }
  .mcp-tab { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 4px 4px 0 0; color: var(--text-dim); padding: 4px; font-size: 10px; cursor: pointer; font-family: var(--mono); }
  .mcp-tab.active { border-color: var(--amber); color: var(--amber); background: rgba(255,193,7,0.05); }
  #mcp-panel {
    position: fixed;
    top: 56px;
    right: 16px;
    z-index: 11;
    width: 300px;
    max-height: calc(100vh - 80px);
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    display: none;
  }
  #mcp-panel .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>
<div style="
  position:fixed;top:0;right:0;z-index:1000;
  padding:8px 16px;
  background:rgba(22,27,34,0.9);
  border-bottom-left-radius:8px;
">
  <a href="/dashboard" style="
    color:#f0883e;text-decoration:none;
    font-size:13px;font-family:sans-serif;
  ">◈ Dashboard</a>
</div>

<div id="loading"><div class="r">◈</div><p>Loading graph...</p></div>

<div id="header">
  <h1><span class="r">◈</span>GoBP<em>graph viewer</em></h1>
  <select id="project-switcher"></select>
</div>

<div id="controls" class="sidebar">
  <section>
    <h3 class="sidebar-section-title">Search</h3>
    <input type="text" id="search" placeholder="name or id...">
  </section>
  <section>
    <h3 class="sidebar-section-title">Group</h3>
    <div id="group-filters"></div>
  </section>
  <section>
    <h3 class="sidebar-section-title">View</h3>
    <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);margin-bottom:10px;cursor:pointer;user-select:none;flex-wrap:wrap;">
      <input type="checkbox" id="showAllEdges" style="width:12px;height:12px;">
      <span>Show all edges</span>
      <span class="hint" style="font-size:9px;color:var(--text-fade);width:100%;padding-left:20px;margin-top:2px;">including edges without reasons</span>
    </label>
    <button id="btn-core">Core Only</button>
    <button id="btn-all">Show All</button>
    <button id="btn-labels">Labels</button>
    <button id="btn-reset">Reset Camera</button>
    <button id="btn-refresh">↺ Refresh</button>
    <button type="button" id="btn-mcp" onclick="toggleMCPPanel()">⚙ MCP</button>
  </section>
</div>

<div id="graph-canvas"></div>

<div id="detail">
  <button class="close" onclick="document.getElementById('detail').classList.remove('visible')">×</button>
  <div id="detail-content"></div>
</div>

<div id="mcp-panel">
  <div class="detail-header">
    <span class="node-type">CONFIG</span>
    <button type="button" onclick="toggleMCPPanel()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px">✕</button>
  </div>
  <h2 style="font-size:16px;margin-bottom:16px">⚙ MCP Config Generator</h2>

  <div class="mcp-field">
    <label>PROJECT ROOT</label>
    <input id="mcp-root" readonly style="opacity:0.7">
  </div>
  <div class="mcp-field">
    <label>PROJECT NAME</label>
    <input id="mcp-name" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>DB NAME</label>
    <input id="mcp-db" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>PYTHON PATH</label>
    <input id="mcp-python" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>DB HOST</label>
    <input id="mcp-dbhost" oninput="generateMCP()">
  </div>
  <div id="mcp-key-preview" style="color:var(--amber);font-size:11px;margin:8px 0">MCP KEY: gobp-project</div>

  <div class="mcp-tabs">
    <button type="button" class="mcp-tab active" data-tab="cli" onclick="switchMCPTab('cli')">Claude CLI</button>
    <button type="button" class="mcp-tab" data-tab="cursor" onclick="switchMCPTab('cursor')">Cursor</button>
    <button type="button" class="mcp-tab" data-tab="ps" onclick="switchMCPTab('ps')">PowerShell</button>
  </div>

  <div id="mcp-output" style="position:relative;margin-top:8px">
    <pre id="mcp-code" style="background:#050508;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:10px;color:#c8c8d4;overflow-x:auto;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:8px"></pre>
    <button type="button" onclick="copyMCP()" style="position:absolute;top:16px;right:8px;font-size:10px;padding:3px 8px" id="mcp-copy-btn">Copy</button>
  </div>
</div>

<div id="statusbar">
  <span id="status-left">Loading...</span>
  <span id="status-right"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1/dist/3d-force-graph.min.js"></script>

<script>
const TYPE_COLORS = {
  Decision:'#ffc107', Node:'#06b6d4', Idea:'#8b5cf6', Session:'#10b981',
  Document:'#3b82f6', Lesson:'#ef4444', Concept:'#eab308', TestKind:'#14b8a6',
  TestCase:'#f97316', Engine:'#f59e0b', Flow:'#22d3ee', Entity:'#a78bfa',
  Feature:'#34d399', Invariant:'#fb923c', Screen:'#60a5fa', APIEndpoint:'#f472b6',
  Repository:'#94a3b8', Wave:'#64748b', Invariant:'#fb923c',
  SoulPrinciple:'#ffd700', SharedLibModule:'#c084fc',
};

/** Top-level group segment → color (schema v3 group_path). */
const GROUP_COLORS = {
  Dev: '#4a90d9',
  Document: '#f0883e',
  Constraint: '#e06c75',
  Error: '#e06c75',
  Test: '#98c379',
  Meta: '#c678dd',
  Unknown: '#636d83',
};

function getNodeColor(node) {
  const group = String(node.group || node.group_path || '').trim();
  if (!group) return GROUP_COLORS.Unknown;
  const top = group.split(/\s*>\s*/)[0].trim();
  return GROUP_COLORS[top] || GROUP_COLORS.Unknown;
}

const PRIORITY_SIZE = { critical: 12, high: 8, medium: 5, low: 3 };
const NODE_VAL_DEFAULT = 5;
/** Layer index for edge “signal” direction (lower = visually higher tier). */
const NODE_TIERS = {
  SoulPrinciple: 1, Decision: 1, Invariant: 1, Concept: 1,
  Entity: 2, SharedLibModule: 2, Config: 2, DBTable: 2,
  Engine: 3, Flow: 3, Feature: 3, Screen: 3, APIEndpoint: 3, UIComponent: 3,

/**
 * Tier weight × -100 → Y (high weight = top). core 20→-2000 … meta 0→0.
 */
const TIER_WEIGHT = { core: 20, domain: 10, ops: 8, test: 2, meta: 0 };

/** Depth (Z) — light spread so 3D view doesn’t collapse to a plane. */
const TIER_Z = {
  core: -900,
  domain: -450,
  ops: 0,
  test: 450,
  meta: 900,
};

/**
 * Horizontal anchor by node type (architecture lanes). Unknown types → 0 + jitter.
 */
const TYPE_X_CENTER = {
  Invariant: -800,
  Decision: -600,
  Concept: -600,
  SoulPrinciple: -800,
  Entity: -200,
  Flow: 0,
  Engine: 200,
  Feature: 400,
  Screen: 600,
  APIEndpoint: 600,
  TestKind: -400,
  TestCase: -200,
  Document: 800,
  Session: 1000,
  Task: 800,
  Wave: 800,
  Node: 0,
  Idea: 400,
  Lesson: 800,
  Repository: 200,
  SharedLibModule: -200,
  Config: -200,
  DBTable: -200,
  UIComponent: 400,
  CtoDevHandoff: 800,
  QaCodeDevHandoff: 800,
};
const TYPE_X_JITTER = 140;

const TYPE_GROUP = {
  Decision: "core", Invariant: "core", Concept: "core",
  Entity: "domain",
  Flow: "ops", Engine: "ops", Feature: "ops", Screen: "ops", APIEndpoint: "ops",
  TestKind: "test", TestCase: "test",
  Session: "meta", Wave: "meta", Document: "meta", Lesson: "meta", Node: "meta", Repository: "meta", Idea: "meta",
  Task: "meta", CtoDevHandoff: "meta", QaCodeDevHandoff: "meta",
};
function stableHash(input) {
  let h = 0;
  for (let i = 0; i < input.length; i += 1) {
    h = ((h << 5) - h) + input.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

const TIER_Z_JITTER = 420;

function tierTargetX(node) {
  const center = TYPE_X_CENTER[node.type] ?? 0;
  const jitter = (stableHash((node.id || node.name || '') + ':x') % (TYPE_X_JITTER * 2)) - TYPE_X_JITTER;
  return center + jitter;
}

function tierTargetY(node) {
  const group = TYPE_GROUP[node.type] || 'meta';
  const w = TIER_WEIGHT[group] ?? 0;
  const base = -100 * w;
  const micro = ((stableHash((node.id || '') + ':y') % 120) - 60) * 0.35;
  return base + micro;
}

function tierTargetZ(node) {
  const group = TYPE_GROUP[node.type] || 'meta';
  const center = TIER_Z[group] ?? TIER_Z.meta;
  const jitter = (stableHash((node.id || '') + ':z') % (TIER_Z_JITTER * 2)) - TIER_Z_JITTER;
  return center + jitter;
}

/** Seed positions before simulation so links don’t start from a point cloud blob. */
function seedTierLayout(nodes) {
  nodes.forEach((n) => {
    n.x = tierTargetX(n);
    n.y = tierTargetY(n);
    n.z = tierTargetZ(n);
    n.vx = 0;
    n.vy = 0;
    n.vz = 0;
  });
}

async function loadGraph(root) {

  try {
    const url = root ? `/api/graph?root=${encodeURIComponent(root)}` : '/api/graph';
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    GRAPH_DATA = data;
    initFilters();
    applyFilters();
    if (FG && GRAPH_DATA.nodes && GRAPH_DATA.nodes.length) {
      setTimeout(() => {
        FG.cameraPosition({ x: 400, y: -900, z: 3400 }, { x: 0, y: -1000, z: 0 }, 900);
      }, 80);

function buildGroupTree(nodes) {
  const root = { _children: {}, _label: 'root' };
  nodes.forEach((n) => {
    const g = (n.group || '').trim();
    if (!g) return;
    const parts = g.split(/\s*>\s*/).map((s) => s.trim()).filter(Boolean);
    let cur = root;
    parts.forEach((part, idx) => {
      if (!cur._children[part]) {
        cur._children[part] = { _children: {}, _label: part, _path: '' };
      }
      const seg = cur._children[part];
      seg._path = parts.slice(0, idx + 1).join(' > ');
      cur = seg;
    });
  });
  return root;
}

/** Sync sidebar ●/○ with ``FILTER_GROUP_PREFIX`` (and All groups button). */

      if (dot) dot.textContent = '●';
    }
  });
}

function _countByGroupPath(nodes) {
  const counts = {};
  nodes.forEach((n) => {
    const g = (n.group || '').trim();
    if (!g) {
      counts['__ungrouped__'] = (counts['__ungrouped__'] || 0) + 1;
      return;
    }
    const parts = g.split(/\s*>\s*/).map((s) => s.trim()).filter(Boolean);
    for (let i = 0; i < parts.length; i++) {
      const prefix = parts.slice(0, i + 1).join(' > ');
      counts[prefix] = (counts[prefix] || 0) + 1;
    }
  });
  return counts;
}

function renderGroupTreeEl(container, tree, counts, depth, allGroupsBtn) {
  const keys = Object.keys(tree._children || {}).sort();
  keys.forEach((k) => {
    const node = tree._children[k];
    const path = node._path || k;
    const cnt = counts[path] || 0;
    const row = document.createElement('div');
    const d = Math.min(depth, 2);
    row.className = `group-item group-level-${d}`;
    row.style.paddingLeft = `${8 + depth * 12}px`;
    if (FILTER_GROUP_PREFIX === path) row.classList.add('active');
    const mark = FILTER_GROUP_PREFIX === path ? '●' : '○';
    row.setAttribute('data-group-path', path);
    row.innerHTML = `
      <span class="group-name">
        <span class="group-dot">${mark}</span>${k}
      </span>
      <span class="group-count">${cnt}</span>`;
    row.addEventListener('click', () => {
      FILTER_GROUP_PREFIX = path;
      if (allGroupsBtn) allGroupsBtn.classList.remove('active');
      document.querySelectorAll('#group-filters .group-item').forEach((el) => {
        el.classList.remove('active');
        const dot = el.querySelector('.group-dot');
        if (dot) dot.textContent = '○';
      });
      row.classList.add('active');
      const dot = row.querySelector('.group-dot');
      if (dot) dot.textContent = '●';
      applyFilters();
    });
    container.appendChild(row);
    if (Object.keys(node._children || {}).length) {
      renderGroupTreeEl(container, node, counts, depth + 1, allGroupsBtn);
    }
  });
}

function initFilters() {
  const nodes = GRAPH_DATA.nodes || [];
  FILTER_GROUP_PREFIX = '';

  const gEl = document.getElementById('group-filters');
  gEl.innerHTML = '';
  const allG = document.createElement('button');
  allG.type = 'button';
  allG.className = 'all-groups-btn';

  allG.addEventListener('click', () => {

    allG.classList.add('active');
    applyFilters();
  });
  gEl.appendChild(allG);
  const treeRoot = buildGroupTree(nodes);
  const counts = _countByGroupPath(nodes);
  const wrap = document.createElement('div');
  wrap.className = 'gf-tree';

  gEl.appendChild(wrap);
  if (counts['__ungrouped__']) {
    const u = document.createElement('div');
    u.className = 'group-item group-level-0';
    u.style.paddingLeft = '8px';
    if (FILTER_GROUP_PREFIX === '__ungrouped__') u.classList.add('active');
    const um = FILTER_GROUP_PREFIX === '__ungrouped__' ? '●' : '○';
    u.setAttribute('data-group-path', '__ungrouped__');
    u.innerHTML = `
      <span class="group-name"><span class="group-dot">${um}</span>(ungrouped)</span>
      <span class="group-count">${counts['__ungrouped__']}</span>`;
    u.addEventListener('click', () => {
      FILTER_GROUP_PREFIX = '__ungrouped__';
      gEl.querySelectorAll('.group-item').forEach((el) => {
        el.classList.remove('active');
        const dot = el.querySelector('.group-dot');
        if (dot) dot.textContent = '○';
      });
      u.classList.add('active');
      const ud = u.querySelector('.group-dot');
      if (ud) ud.textContent = '●';
      allG.classList.remove('active');
      applyFilters();
    });
    gEl.appendChild(u);
  }
  syncGroupSidebarHighlight();
}

function applyFilters(searchSet=null, hits=null) {
  const nodes = GRAPH_DATA.nodes.filter((n) => {
    if (FILTER_GROUP_PREFIX) {
      const g = (n.group || '').trim();
      if (FILTER_GROUP_PREFIX === '__ungrouped__') {
        if (g) return false;
      } else if (g !== FILTER_GROUP_PREFIX && !g.startsWith(FILTER_GROUP_PREFIX + ' > ')) {
        return false;
      }
    }
    if (searchSet && !searchSet.has(n.id)) return false;
    return true;
  });
  const ids = new Set(nodes.map(n=>n.id));
  const nodesById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const rawEdges = GRAPH_DATA.links || GRAPH_DATA.edges || [];
  let hiddenMeta = 0;
  const links = rawEdges.filter((e) => {
    if (!ids.has(e.source || e.from) || !ids.has(e.target || e.to)) return false;
    if (!SHOW_ALL_EDGES && e.type === 'discovered_in') {
      hiddenMeta += 1;
      return false;
    }
    return true;
  }).map(e => {
    const rawSource = e.source || e.from;
    const rawTarget = e.target || e.to;
    const sourceTier = NODE_TIERS[nodesById[rawSource]?.type] || 3;
    const targetTier = NODE_TIERS[nodesById[rawTarget]?.type] || 3;
    const sameTier = sourceTier === targetTier;

    // Signal rule:
    // - Same tier: send "return" pulse (reverse direction)
    // - Different tier: always from lower layer (bigger tier) to upper (smaller tier)
    const signalSource = sameTier
      ? rawTarget
      : (sourceTier > targetTier ? rawSource : rawTarget);
    const signalTarget = sameTier
      ? rawSource
      : (sourceTier > targetTier ? rawTarget : rawSource);
    const tierDelta = Math.abs(sourceTier - targetTier);

    return {
      ...e,
      source: signalSource,
      target: signalTarget,
      __sameTier: sameTier,
      __tierDelta: tierDelta,
    };
  });

  nodes.forEach(n => { n.__hit = hits ? hits.has(n.id) : false; });
  seedTierLayout(nodes);
  FG.graphData({nodes, links});
  document.getElementById('status-left').textContent =
    `${nodes.length} / ${GRAPH_DATA.nodes.length} nodes`;
  const edgeLine = hiddenMeta
    ? `${links.length} edges (${hiddenMeta} metadata hidden)`
    : `${links.length} edges`;
  document.getElementById('status-right').textContent = edgeLine;
}

function initGraph() {
  FG = ForceGraph3D()(document.getElementById('graph-canvas'))
    .backgroundColor('#0a0a0f')
    .nodeLabel(n => n.name)
    .nodeColor(n => n.__hit ? '#ffffff' : (getNodeColor(n) || TYPE_COLORS[n.type] || '#888'))
    .nodeOpacity(0.92)
    .nodeVal((n) => READ_ORDER_SIZE[n.read_order] || PRIORITY_SIZE[n.priority] || NODE_VAL_DEFAULT)
    .nodeRelSize(6)
    .nodeThreeObject(n => {
      if(!SHOW_LABELS) return null;
      return makeSprite(n.name);
    })
    .nodeThreeObjectExtend(false)
    .linkColor(l => EDGE_STATIC_COLORS[l.type] || 'rgba(180, 188, 204, 0.24)')
    .linkWidth(l => ['implements','depends_on','enforces'].includes(l.type)?2.1:1.5)
    // Single pulse per edge: a new cycle starts after reaching destination.
    .linkDirectionalParticles(() => 1)
    .linkDirectionalParticleWidth(l => ['implements','depends_on','enforces'].includes(l.type) ? 5.4 : 4.5)
    .linkDirectionalParticleSpeed(l => {
      // Same tier = slower "return" signal.
      if (l.__sameTier) return 0.0038;
      // Cross-tier upward = faster, scaled by tier gap.
      const delta = l.__tierDelta || 1;
      return Math.min(0.009, 0.0056 + (delta * 0.0012));
    })
    .linkDirectionalParticleColor(l => EDGE_SIGNAL_COLORS[l.type] || '#ffd54f')
    .onNodeClick(n => showDetail(n))
    .onBackgroundClick(() => document.getElementById('detail').classList.remove('visible'));

  FG.d3Force('charge').strength(-420);
  const linkForce = FG.d3Force('link');
  linkForce.distance((l) => {
    const t = l.type || '';
    if (t === 'discovered_in') return 20;
    if (t === 'implements' || t === 'depends_on') return 150;
    if (t === 'relates_to') return 100;
    if (t === 'belongs_to') return 80;
    const sourceTier = NODE_TIERS[(l.source && l.source.type) || 'Node'] || 3;
    const targetTier = NODE_TIERS[(l.target && l.target.type) || 'Node'] || 3;
    const delta = Math.abs(sourceTier - targetTier);
    return 120 + (delta * 40);
  });
  if (typeof linkForce.strength === 'function') {
    linkForce.strength(() => 0.12);
  }
  FG.d3Force('x', d3.forceX((n) => tierTargetX(n)).strength(0.15));
  FG.d3Force('y', d3.forceY((n) => tierTargetY(n)).strength(0.3));
  if (typeof d3.forceZ === 'function') {
    FG.d3Force('z', d3.forceZ((n) => tierTargetZ(n)).strength(0.08));
  }
  FG.d3Force(
    'collide',
    d3.forceCollide((n) => (READ_ORDER_SIZE[n.read_order] || PRIORITY_SIZE[n.priority] || NODE_VAL_DEFAULT) * 10 + 42).strength(0.92),
  );
  FG.d3VelocityDecay(0.28);
  if (typeof FG.cooldownTicks === 'function') {
    FG.cooldownTicks(450);
  }
}

function makeSprite(text) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fs = 32;
  ctx.font = `500 ${fs}px "Courier New", ui-monospace, monospace`;
  const w = ctx.measureText(text).width;
  canvas.width = w+16; canvas.height = fs+8;
  ctx.font = `500 ${fs}px "Courier New", ui-monospace, monospace`;
  ctx.fillStyle = '#f0e6d3';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 8, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
  const sprite = new THREE.Sprite(mat);
  const aspect = canvas.width/canvas.height;
  sprite.scale.set(aspect*4, 4, 1);
  return sprite;
}

function generateMCP() {

  const db = document.getElementById('mcp-db').value;
  const python = document.getElementById('mcp-python').value;
  const dbhost = document.getElementById('mcp-dbhost').value;
  const key = getMCPKey();

  document.getElementById('mcp-key-preview').textContent = 'MCP KEY: ' + key;

  const serverObj = {
    type: 'stdio',
    command: python,
    args: ['-m', 'gobp.mcp.server'],
    env: {
      GOBP_PROJECT_ROOT: root,
      GOBP_DB_URL: dbhost + '/' + db
    }
  };

  const cursorObj = { ...serverObj };
  delete cursorObj.type;

  let output = '';
  if (mcpTab === 'cli') {
    output = JSON.stringify({ mcpServers: { [key]: serverObj } }, null, 2);
  } else if (mcpTab === 'cursor') {
    output = JSON.stringify({ mcpServers: { [key]: cursorObj } }, null, 2);
  } else {
    output = `# Add ${key} to ~/.claude.json
$server = [PSCustomObject]@{
  type = "stdio"
  command = "${python}"
  args = @("-m", "gobp.mcp.server")
  env = [PSCustomObject]@{
    GOBP_PROJECT_ROOT = "${root}"
    GOBP_DB_URL = "${dbhost}/${db}"
  }
}
# Run this script to add the MCP server automatically`;

  document.getElementById('mcp-code').textContent = output;

function descParts(node) {
  const d = node.description;
  if (d && typeof d === 'object' && !Array.isArray(d)) {
    return { info: String(d.info || ''), code: String(d.code || '') };
  }
  return { info: String(d || ''), code: '' };
}

/** v3 ``node.code`` or v2 ``description.code`` (not ``descParts().code`` when description is string). */
function getNodeCodeText(node) {
  if (!node) return '';
  if (node.code != null && String(node.code).trim()) {
    return String(node.code).trim();
  }
  if (
    node.description
    && typeof node.description === 'object'
    && !Array.isArray(node.description)
    && node.description.code != null
    && String(node.description.code).trim()
  ) {
    return String(node.description.code).trim();
  }
  return '';
}

function renderDescriptionPanel(body) {
  if (!body || !String(body).trim()) return '';
  return `
    <div class="detail-panel detail-panel--description">
      <div class="detail-panel-title">DESCRIPTION</div>
      <div class="detail-panel-body detail-panel-body--prose">${esc(String(body).trim())}</div>
    </div>`;
}

function renderCodePanel(code) {
  if (!code || !String(code).trim()) return '';
  return `
    <div class="detail-panel detail-panel--code">
      <div class="detail-panel-title">CODE</div>
      <pre class="detail-panel-body detail-panel-body--code"><code>${esc(String(code).trim())}</code></pre>
    </div>`;
}

function renderCodeBlock(code) {
  if (!code || !String(code).trim()) return '';
  return renderCodePanel(String(code).trim());
}

/** CODE from v3 ``node.code`` or v2-style ``description.code`` — framed, after DESCRIPTION. */
function renderCodeSection(node) {
  return renderCodePanel(getNodeCodeText(node));
}

/**
 * Split edge ``reason`` into prose vs code.
 * - YAML object { info, code } if loaded as object
 * - Or single string with ``\\n---\\n`` or ``\\n---CODE---\\n`` between blocks
 * - Or JSON `{ "info": "...", "code": "..." }`
 */
function splitReasonParts(raw) {
  if (raw == null || raw === '') return { desc: '', code: '' };
  if (typeof raw === 'object' && !Array.isArray(raw)) {
    const o = raw;
    if ('info' in o || 'code' in o) {
      return {
        desc: String(o.info != null ? o.info : '').trim(),
        code: String(o.code != null ? o.code : '').trim(),
      };
    }
  }
  const s = String(raw);
  const sep = /\r?\n---CODE---\r?\n|\r?\n---\r?\n/;
  const m = s.split(sep);
  if (m.length >= 2) {
    return { desc: m[0].trim(), code: m.slice(1).join('\n').trim() };
  }
  try {
    const o = JSON.parse(s);
    if (o && typeof o === 'object' && (o.info != null || o.code != null)) {
      return {
        desc: String(o.info != null ? o.info : '').trim(),
        code: String(o.code != null ? o.code : '').trim(),
      };
    }
  } catch (_) { /* ignore */ }
  return { desc: s.trim(), code: '' };
}

/**
 * Prose + code strings for an edge (same rules as former expanded panels).
 * ``reason`` ≈ desc_full; ``code`` matches node code.
 */
function getEdgeDetailParts(edge) {
  const e = edge || {};
  const reasonField = e.reason;
  const codeField = e.code;
  const hasSplitCode =
    codeField != null
    && String(codeField).trim() !== ''
    && String(codeField).trim() !== String(reasonField || '').trim();

  if (hasSplitCode) {
    const reasonText = reasonField != null ? String(reasonField).trim() : '';
    const codeText = String(codeField).trim();
    return { reasonText, codeText };
  }

  const rp = splitReasonParts(reasonField);
  return { reasonText: rp.desc, codeText: rp.code };
}

function edgeHasExpandableDetail(edge) {
  const p = getEdgeDetailParts(edge);
  return !!(p.reasonText || p.codeText);
}

function sanitizeEdgeDomId(s) {
  return String(s).replace(/[^a-zA-Z0-9_-]/g, '_');
}

/** Toggle expanded reason/code under an edge row (Wave G Hotfix4). */
function toggleEdgeDetail(expandId, toggleEl) {
  const el = document.getElementById(expandId);
  if (!el || !toggleEl) return;
  const closed = el.style.display === 'none' || el.style.display === '';
  if (closed) {
    el.style.display = 'block';
    toggleEl.textContent = '▼';
  } else {
    el.style.display = 'none';
    toggleEl.textContent = '▶';
  }
}

/** Open detail + focus for a node id (edge list navigation). */
function selectNodeById(nodeId) {
  const n = (GRAPH_DATA.nodes || []).find((x) => x.id === nodeId);
  if (n) {
    showDetail(n);
  } else {
    console.warn('Node not found in graph:', nodeId);
  }
}

function renderHistory(node) {
  const history = node.history || [];
  if (!history.length) return '';
  const items = history.map((entry, i) => {
    const e = entry || {};
    let desc = e.description ?? e.desc ?? '';
    if (desc && typeof desc === 'object' && !Array.isArray(desc)) {
      desc = desc.info != null ? String(desc.info) : JSON.stringify(desc);
    } else {
      desc = String(desc || '');
    }
    const code = e.code != null ? String(e.code) : '';
    let ts = '';
    const ca = e.created_at ?? e.ts ?? e.createdAt;
    if (ca != null && ca !== '') {
      let d;
      if (typeof ca === 'number') {
        d = ca < 1e12 ? new Date(ca * 1000) : new Date(ca);
      } else {
        d = new Date(ca);
      }
      if (!isNaN(d.getTime())) ts = d.toLocaleDateString();
    }
    return `
        <div class="history-item">
            <div class="history-header">
                <span class="history-index">#${i + 1}</span>
                ${ts ? `<span class="history-date">${esc(ts)}</span>` : ''}
            </div>
            ${desc.trim() ? `<div class="history-desc">${esc(desc.trim())}</div>` : ''}
            ${code.trim() ? `<pre class="code-block history-code"><code>${esc(code.trim())}</code></pre>` : ''}
        </div>`;
  }).join('');
  return `
    <div class="detail-section">
      <div class="detail-section-title">HISTORY (${history.length})</div>
      ${items}
    </div>`;
}

function renderSeverityBadge(severity) {
  if (!severity) return '';
  const colors = {
    fatal: { bg: '#4a1515', text: '#f85149', border: '#f85149' },
    error: { bg: '#3a1a10', text: '#f0883e', border: '#f0883e' },
    warning: { bg: '#2d2610', text: '#e3b341', border: '#e3b341' },
    info: { bg: '#0d2137', text: '#58a6ff', border: '#58a6ff' },
  };
  const key = String(severity).toLowerCase();
  const c = colors[key] || colors.info;
  return `<span class="severity-badge" style="background:${c.bg};color:${c.text};border:1px solid ${c.border};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;">${esc(String(severity).toUpperCase())}</span>`;
}

/** All edges touching nodeId (both directions). Collapsed rows; expand for reason + code. */
function renderEdges(nodeId, allEdges, allNodes) {
  const nodesById = {};
  (allNodes || []).forEach((n) => {
    if (n && n.id) nodesById[n.id] = n;
  });

  const related = (allEdges || []).filter((e) => {
    const f = e.from || e.source || e.from_id;
    const t = e.to || e.target || e.to_id;
    return f === nodeId || t === nodeId;
  });

  if (!related.length) {
    return `
    <div class="detail-section">
      <div class="detail-section-title">EDGES</div>
      <div class="no-edges">No connections</div>
    </div>`;
  }

  const idBase = sanitizeEdgeDomId(nodeId);
  const items = related.map((e, idx) => {
    const f = e.from || e.source || e.from_id;
    const t = e.to || e.target || e.to_id;
    const otherId = (f === nodeId) ? t : f;
    const otherNode = nodesById[otherId];
    const otherName = otherNode
      ? (otherNode.name || otherId)
      : (e.to_name || e.from_name || otherId);
    const expandId = `edge-exp-${idBase}-${idx}`;
    const parts = getEdgeDetailParts(e);
    const hasDetail = edgeHasExpandableDetail(e);
    const expandBlock = hasDetail
      ? `
        <div class="edge-expand" id="${expandId}" style="display:none">
          ${parts.reasonText ? `<div class="edge-reason-text">${esc(parts.reasonText)}</div>` : ''}
          ${parts.codeText ? `<pre class="edge-code-block"><code>${esc(parts.codeText)}</code></pre>` : ''}
        </div>`
      : '';
    const toggleBtn = hasDetail
      ? `<span class="edge-toggle" data-edge-expand-id="${escAttr(expandId)}" role="button" tabindex="0">▶</span>`
      : '<span class="edge-toggle edge-toggle--empty" aria-hidden="true">·</span>';
    return `
        <div class="edge-item">
            <div class="edge-header">
                ${toggleBtn}
                <span class="edge-node-name" data-edge-nav="${escAttr(otherId)}">${esc(otherName)}</span>
            </div>
            ${expandBlock}
        </div>`;
  }).join('');

  return `
    <div class="detail-section">
      <div class="detail-section-title">EDGES (${related.length})</div>
      ${items}
      <div class="edge-nav-hint">▶ Click tên node để navigate · Click ▶ để xem reason + code</div>
    </div>`;
}

function showDetail(node) {
  const mcpPanel = document.getElementById('mcp-panel');
  if (mcpPanel) mcpPanel.style.display = 'none';
  function breadcrumbHtml(n) {
    const g = (n.group || '').trim();
    if (!g) return '';
    const parts = g.split(/\s*>\s*/).map((s) => s.trim()).filter(Boolean);
    const links = parts
      .map((p, i) => {
        const pref = parts.slice(0, i + 1).join(' > ');
        return `<a href="#" data-gpref="${escAttr(pref)}">${esc(p)}</a>`;
      })
      .join(' &gt; ');
    return `<div class="v2-breadcrumb">◈ ${links}</div>`;
  }

  let html = '';
  const nt = node.type || '';

  if (nt === 'ErrorCase') {
    html += breadcrumbHtml(node);
    html += `<div class="node-id" style="margin-bottom:6px">${esc(node.id)}</div>`;
    html += `<div class="v2-type-row"><span class="v2-type">ERROR CASE</span>${renderSeverityBadge(node.severity)}</div>`;
    html += `<div class="v2-title">${esc(node.name || '')}</div>`;
    const blocks = [
      ['TRIGGER', node.trigger],
      ['SYSTEM RESPONSE', node.handling],
      ['FIX', node.fix],
      ['USER MESSAGE', node.user_message],
      ['DEV NOTE', node.dev_note],
    ];
    blocks.forEach(([title, val]) => {
      if (val == null || val === '') return;
      html += `<div class="v2-section"><div class="v2-h">${title}</div><div class="v2-desc-info">${esc(String(val))}</div></div>`;
    });
    if (node.context) {
      html += `<div class="v2-section"><div class="v2-h">CONTEXT</div><pre class="v2-raw">${esc(JSON.stringify(node.context, null, 2))}</pre></div>`;
    }
    const fh = node.fix_history;
    const hist = Array.isArray(fh) ? fh : fh ? [fh] : [];
    if (hist.length) {
      html += `<div class="v2-section"><div class="v2-h">FIX HISTORY</div><ul style="font-size:10px;color:var(--text-dim);padding-left:16px;">`;
      hist.forEach((h) => {
        const line = typeof h === 'object' ? JSON.stringify(h) : String(h);
        html += `<li>${esc(line)}</li>`;
      });
      html += `</ul></div>`;
    }
    html += renderCodeSection(node);
  } else if (nt === 'Invariant') {
    html += breadcrumbHtml(node);
    html += `<div class="node-id" style="margin-bottom:6px">${esc(node.id)}</div>`;
    html += `<div class="v2-type">INVARIANT</div>`;
    html += `<div class="v2-title">${esc(node.name || '')}</div>`;
    if (node.rule) {
      html += `<div class="v2-section"><div class="v2-h">RULE</div><div class="v2-desc-info">${esc(String(node.rule))}</div></div>`;
    }
    if (node.scope) {
      html += `<div class="v2-section"><div class="v2-h">SCOPE</div><div class="v2-desc-info">${esc(String(node.scope))}</div></div>`;
    }
    const enf = node.enforcement || node.enforced_by;
    if (enf) {
      html += `<div class="v2-section"><div class="v2-h">ENFORCEMENT</div><div class="v2-desc-info">${esc(String(enf))}</div></div>`;
    }
    html += renderCodeSection(node);
  } else {
    html += breadcrumbHtml(node);
    html += `<div class="node-id" style="margin-bottom:6px">${esc(node.id)}</div>`;
    html += `<div class="v2-type">${esc(nt)}</div>`;
    html += `<div class="v2-title">${esc(node.name || '')}</div>`;
    const dp = descParts(node);
    html += renderDescriptionPanel(dp.info);
    html += renderCodeSection(node);
  }

  const edges = GRAPH_DATA.edges || GRAPH_DATA.links || [];
  html += renderEdges(node.id, edges, GRAPH_DATA.nodes);
  html += renderHistory(node);

  const content = document.getElementById('detail-content');
  content.innerHTML = html;
  document.getElementById('detail').classList.add('visible');

  content.querySelectorAll('.edge-toggle[data-edge-expand-id]').forEach((btn) => {
    const go = () => {
      const eid = btn.getAttribute('data-edge-expand-id');
      if (eid) toggleEdgeDetail(eid, btn);
    };
    btn.addEventListener('click', (ev) => {
      ev.stopPropagation();
      go();
    });
    btn.addEventListener('keydown', (ev) => {
      if (ev.key === 'Enter' || ev.key === ' ') {
        ev.preventDefault();
        go();
      }
    });
  });

  content.querySelectorAll('.rel-target[data-id], .edge-node-name[data-edge-nav]').forEach((el) => {
    el.addEventListener('click', (ev) => {
      if (el.hasAttribute('data-edge-nav')) ev.stopPropagation();
      const nid = el.getAttribute('data-id') || el.getAttribute('data-edge-nav');
      if (nid) selectNodeById(nid);
    });
  });
  content.querySelectorAll('.v2-breadcrumb a[data-gpref]').forEach((a) => {
    a.addEventListener('click', (ev) => {
      ev.preventDefault();
      FILTER_GROUP_PREFIX = a.getAttribute('data-gpref') || '';
      applyFilters();
    });
  });

  focusNode(node);
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
}

function focusNode(n) {
  if (n.x == null && n.y == null && n.z == null) return;
  const cx = n.x || 0, cy = n.y || 0, cz = n.z || 0;
  const d = 1800;
  const dist = Math.hypot(cx, cy, cz) || 1;
  const r = 1 + d / dist;
  FG.cameraPosition({ x: cx * r, y: cy * r, z: cz * r }, n, 800);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('btn-core').addEventListener('click', () => {
  FILTER_GROUP_PREFIX = '';
  document.querySelectorAll('#lifecycle-filters input').forEach((cb) => {
    cb.checked = true;
  });
  document.querySelectorAll('#readorder-filters input').forEach((cb) => {
    cb.checked = true;
  });
  applyFilters();
});
document.getElementById('btn-all').addEventListener('click', () => {
  FILTER_GROUP_PREFIX = '';
  document.querySelectorAll('#lifecycle-filters input').forEach((cb) => {
    cb.checked = true;
  });
  document.querySelectorAll('#readorder-filters input').forEach((cb) => {
    cb.checked = true;
  });
  applyFilters();
});
document.getElementById('btn-labels').addEventListener('click', () => {
  SHOW_LABELS = !SHOW_LABELS; FG.refresh();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  FG.cameraPosition({ x: 400, y: -900, z: 3400 }, { x: 0, y: -1000, z: 0 }, 900);
});
document.getElementById('btn-refresh').addEventListener('click', () => {
  loadGraph(CURRENT_ROOT);
});
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if(!q) { applyFilters(); return; }
  const hits = new Set();
  GRAPH_DATA.nodes.forEach(n => {
    if(n.id.toLowerCase().includes(q)||(n.name||'').toLowerCase().includes(q)) hits.add(n.id);
  });
  const neighbors = new Set(hits);
  (GRAPH_DATA.edges||GRAPH_DATA.links||[]).forEach(e => {
    const f=e.from||e.source, t=e.to||e.target;
    if(hits.has(f)) neighbors.add(t);
    if(hits.has(t)) neighbors.add(f);
  });
  applyFilters(neighbors, hits);
});

boot();
</script>
</body>
</html>
