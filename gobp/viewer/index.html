<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>◈ GoBP Graph Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --bg-panel: rgba(15,15,22,0.92);
    --border: rgba(255,193,7,0.14);
    --border-strong: rgba(255,193,7,0.35);
    --text: #e8e8ee;
    --text-dim: #8a8a95;
    --text-fade: #4a4a55;
    --amber: #ffc107;
    --amber-soft: rgba(255,193,7,0.7);
    --mono: 'Courier New', ui-monospace, monospace;
    --serif: Georgia, serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; font-weight: 300; -webkit-font-smoothing: antialiased; }

  #graph-canvas { position: fixed; inset: 0; z-index: 1; }

  #header { position: fixed; top: 0; left: 0; right: 0; z-index: 10; padding: 14px 24px 10px; background: linear-gradient(180deg, var(--bg) 40%, transparent); pointer-events: none; display: flex; align-items: baseline; gap: 12px; }
  #header h1 { font-family: var(--serif); font-weight: 300; font-size: 20px; pointer-events: auto; }
  #header h1 .r { color: var(--amber); font-weight: 500; margin-right: 6px; }
  #header h1 em { font-style: italic; color: var(--amber-soft); font-size: 0.65em; margin-left: 6px; letter-spacing: 0.12em; text-transform: uppercase; font-family: var(--mono); }
  #project-switcher { pointer-events: auto; background: transparent; border: 1px solid var(--border); color: var(--amber-soft); font-family: var(--mono); font-size: 11px; padding: 4px 8px; cursor: pointer; outline: none; }
  #project-switcher:focus { border-color: var(--border-strong); }

  #controls { position: fixed; top: 56px; left: 16px; z-index: 10; width: 220px; background: var(--bg-panel); backdrop-filter: blur(16px); border: 1px solid var(--border); padding: 14px 16px; max-height: calc(100vh - 80px); overflow-y: auto; }
  #controls section { margin-bottom: 16px; }
  #controls h3 { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em; color: var(--amber-soft); margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
  #controls label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text); padding: 2px 0; cursor: pointer; user-select: none; }
  #controls label:hover { color: var(--amber); }
  #controls input[type="checkbox"] { appearance: none; width: 10px; height: 10px; border: 1px solid var(--text-dim); background: transparent; cursor: pointer; flex-shrink: 0; position: relative; }
  #controls input[type="checkbox"]:checked { background: var(--amber); border-color: var(--amber); }
  #controls .count { margin-left: auto; font-size: 9px; color: var(--text-fade); }
  #controls input[type="text"] { width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; padding: 4px 0; outline: none; }
  #controls input[type="text"]:focus { border-bottom-color: var(--amber); }
  #controls input[type="text"]::placeholder { color: var(--text-fade); }
  #controls button { background: transparent; border: 1px solid var(--border-strong); color: var(--amber); font-family: var(--mono); font-size: 9px; padding: 5px 8px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; transition: all 0.15s; margin-right: 4px; margin-bottom: 4px; }
  #controls button:hover { background: var(--amber); color: var(--bg); }

  #detail { position: fixed; top: 56px; right: 16px; z-index: 10; width: 300px; background: var(--bg-panel); backdrop-filter: blur(16px); border: 1px solid var(--border); padding: 16px 18px; max-height: calc(100vh - 80px); overflow-y: auto; display: none; }
  #detail.visible { display: block; }
  #detail .close { position: absolute; top: 12px; right: 14px; background: none; border: none; color: var(--text-dim); font-size: 16px; cursor: pointer; }
  #detail .close:hover { color: var(--amber); }
  #detail .node-type { font-size: 9px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.22em; color: var(--amber-soft); margin-bottom: 4px; }
  #detail .node-id { font-size: 9px; color: var(--text-fade); margin-bottom: 8px; word-break: break-all; }
  #detail .node-name { font-family: var(--serif); font-size: 17px; font-weight: 300; color: var(--text); line-height: 1.3; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
  #detail .field { margin-bottom: 8px; }
  #detail .field-label { font-size: 9px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--text-dim); margin-bottom: 2px; }
  #detail .field-value { font-size: 11px; color: var(--text); line-height: 1.5; word-break: break-word; }
  #detail .relations { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
  #detail .relations h4 { font-size: 9px; text-transform: uppercase; letter-spacing: 0.22em; color: var(--amber-soft); margin-bottom: 6px; }
  #detail .rel-item { font-size: 10px; padding: 2px 0; color: var(--text-dim); display: flex; gap: 6px; cursor: pointer; }
  #detail .rel-item:hover .rel-target { color: var(--amber); }
  #detail .rel-verb { color: var(--text-fade); font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; min-width: 70px; flex-shrink: 0; }
  #detail .rel-target { color: var(--text); }
  #detail .gobp-query { background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 6px 10px; font-size: 10px; color: var(--amber); margin-top: 12px; word-break: break-all; }

  #statusbar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 10; padding: 8px 24px; background: linear-gradient(0deg, var(--bg) 40%, transparent); font-size: 9px; color: var(--text-fade); letter-spacing: 0.12em; text-transform: uppercase; display: flex; justify-content: space-between; pointer-events: none; }

  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: var(--bg); z-index: 100; flex-direction: column; gap: 12px; }
  #loading .r { color: var(--amber); font-size: 36px; animation: pulse 2s ease-in-out infinite; }
  #loading p { font-size: 10px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; }
  @keyframes pulse { 0%,100%{opacity:0.3;transform:scale(1)} 50%{opacity:1;transform:scale(1.08)} }

  #controls::-webkit-scrollbar, #detail::-webkit-scrollbar, #mcp-panel::-webkit-scrollbar { width: 3px; }
  #controls::-webkit-scrollbar-thumb, #detail::-webkit-scrollbar-thumb, #mcp-panel::-webkit-scrollbar-thumb { background: var(--border-strong); }

  #btn-mcp {
    margin-top: 4px;
    width: 100%;
    background: rgba(255,193,7,0.08);
    color: var(--amber);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px;
    cursor: pointer;
    font-size: 11px;
    font-family: var(--mono);
  }
  #btn-mcp:hover { background: rgba(255,193,7,0.15); }
  .mcp-field { margin-bottom: 8px; }
  .mcp-field label { display: block; color: var(--text-dim); font-size: 10px; margin-bottom: 3px; }
  .mcp-field input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 5px 8px; font-family: var(--mono); font-size: 11px; }
  .mcp-field input:focus { outline: none; border-color: var(--amber); }
  .mcp-tabs { display: flex; gap: 4px; margin-top: 12px; }
  .mcp-tab { flex: 1; background: transparent; border: 1px solid var(--border); border-radius: 4px 4px 0 0; color: var(--text-dim); padding: 4px; font-size: 10px; cursor: pointer; font-family: var(--mono); }
  .mcp-tab.active { border-color: var(--amber); color: var(--amber); background: rgba(255,193,7,0.05); }
  #mcp-panel {
    position: fixed;
    top: 56px;
    right: 16px;
    z-index: 11;
    width: 300px;
    max-height: calc(100vh - 80px);
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    padding: 16px;
    overflow-y: auto;
    display: none;
  }
  #mcp-panel .detail-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
</style>
</head>
<body>

<div id="loading"><div class="r">◈</div><p>Loading graph...</p></div>

<div id="header">
  <h1><span class="r">◈</span>GoBP<em>graph viewer</em></h1>
  <select id="project-switcher"></select>
</div>

<div id="controls">
  <section>
    <h3>Search</h3>
    <input type="text" id="search" placeholder="name or id...">
  </section>
  <section>
    <h3>Node Type</h3>
    <div id="type-filters"></div>
  </section>
  <section>
    <h3>Status</h3>
    <div id="status-filters"></div>
  </section>
  <section>
    <h3>View</h3>
    <label style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text);margin-bottom:10px;cursor:pointer;user-select:none;">
      <input type="checkbox" id="chk-metadata-edges" style="width:12px;height:12px;">
      <span>Show metadata edges</span>
      <span style="font-size:9px;color:var(--text-fade);">(e.g. <code>discovered_in</code>)</span>
    </label>
    <button id="btn-core">Core Only</button>
    <button id="btn-all">Show All</button>
    <button id="btn-labels">Labels</button>
    <button id="btn-reset">Reset Camera</button>
    <button id="btn-refresh">↺ Refresh</button>
    <button type="button" id="btn-mcp" onclick="toggleMCPPanel()">⚙ MCP</button>
  </section>
</div>

<div id="graph-canvas"></div>

<div id="detail">
  <button class="close" onclick="document.getElementById('detail').classList.remove('visible')">×</button>
  <div id="detail-content"></div>
</div>

<div id="mcp-panel">
  <div class="detail-header">
    <span class="node-type">CONFIG</span>
    <button type="button" onclick="toggleMCPPanel()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px">✕</button>
  </div>
  <h2 style="font-size:16px;margin-bottom:16px">⚙ MCP Config Generator</h2>

  <div class="mcp-field">
    <label>PROJECT ROOT</label>
    <input id="mcp-root" readonly style="opacity:0.7">
  </div>
  <div class="mcp-field">
    <label>PROJECT NAME</label>
    <input id="mcp-name" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>DB NAME</label>
    <input id="mcp-db" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>PYTHON PATH</label>
    <input id="mcp-python" oninput="generateMCP()">
  </div>
  <div class="mcp-field">
    <label>DB HOST</label>
    <input id="mcp-dbhost" oninput="generateMCP()">
  </div>
  <div id="mcp-key-preview" style="color:var(--amber);font-size:11px;margin:8px 0">MCP KEY: gobp-project</div>

  <div class="mcp-tabs">
    <button type="button" class="mcp-tab active" data-tab="cli" onclick="switchMCPTab('cli')">Claude CLI</button>
    <button type="button" class="mcp-tab" data-tab="cursor" onclick="switchMCPTab('cursor')">Cursor</button>
    <button type="button" class="mcp-tab" data-tab="ps" onclick="switchMCPTab('ps')">PowerShell</button>
  </div>

  <div id="mcp-output" style="position:relative;margin-top:8px">
    <pre id="mcp-code" style="background:#050508;border:1px solid var(--border);border-radius:6px;padding:12px;font-size:10px;color:#c8c8d4;overflow-x:auto;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:8px"></pre>
    <button type="button" onclick="copyMCP()" style="position:absolute;top:16px;right:8px;font-size:10px;padding:3px 8px" id="mcp-copy-btn">Copy</button>
  </div>
</div>

<div id="statusbar">
  <span id="status-left">Loading...</span>
  <span id="status-right"></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1/dist/3d-force-graph.min.js"></script>

<script>
const TYPE_COLORS = {
  Decision:'#ffc107', Node:'#06b6d4', Idea:'#8b5cf6', Session:'#10b981',
  Document:'#3b82f6', Lesson:'#ef4444', Concept:'#eab308', TestKind:'#14b8a6',
  TestCase:'#f97316', Engine:'#f59e0b', Flow:'#22d3ee', Entity:'#a78bfa',
  Feature:'#34d399', Invariant:'#fb923c', Screen:'#60a5fa', APIEndpoint:'#f472b6',
  Repository:'#94a3b8', Wave:'#64748b', Invariant:'#fb923c',
  SoulPrinciple:'#ffd700', SharedLibModule:'#c084fc',
};
const STATUS_COLORS = {
  ACTIVE:'#10b981', DRAFT:'#64748b', DEPRECATED:'#ef4444',
  SKELETON:'#4a4a55', BUILT:'#3b82f6', VERIFIED:'#10b981',
  IN_PROGRESS:'#f59e0b', BLOCKED:'#ef4444', LEGACY_DISCARDED:'#2a2a35',
  READY:'#22d3ee', COMPLETED:'#10b981',
};
const CORE_TYPES = new Set(['Engine','Flow','Entity','Feature','Decision',
  'SoulPrinciple','Invariant','Document','Node','Idea']);
const PRIORITY_SIZE = {critical:8, high:5, medium:3, low:2};
/** Layer index for edge “signal” direction (lower = visually higher tier). */
const NODE_TIERS = {
  SoulPrinciple: 1, Decision: 1, Invariant: 1, Concept: 1,
  Entity: 2, SharedLibModule: 2, Config: 2, DBTable: 2,
  Engine: 3, Flow: 3, Feature: 3, Screen: 3, APIEndpoint: 3, UIComponent: 3,
  TestKind: 4, TestCase: 4,
  Repository: 5, Document: 5, Wave: 5, Session: 5, Idea: 5, Node: 5, Lesson: 5,
  Task: 5, CtoDevHandoff: 5, QaCodeDevHandoff: 5,
};

/**
 * Tier weight × -100 → Y (high weight = top). core 20→-2000 … meta 0→0.
 */
const TIER_WEIGHT = { core: 20, domain: 10, ops: 8, test: 2, meta: 0 };

/** Depth (Z) — light spread so 3D view doesn’t collapse to a plane. */
const TIER_Z = {
  core: -900,
  domain: -450,
  ops: 0,
  test: 450,
  meta: 900,
};

/**
 * Horizontal anchor by node type (architecture lanes). Unknown types → 0 + jitter.
 */
const TYPE_X_CENTER = {
  Invariant: -800,
  Decision: -600,
  Concept: -600,
  SoulPrinciple: -800,
  Entity: -200,
  Flow: 0,
  Engine: 200,
  Feature: 400,
  Screen: 600,
  APIEndpoint: 600,
  TestKind: -400,
  TestCase: -200,
  Document: 800,
  Session: 1000,
  Task: 800,
  Wave: 800,
  Node: 0,
  Idea: 400,
  Lesson: 800,
  Repository: 200,
  SharedLibModule: -200,
  Config: -200,
  DBTable: -200,
  UIComponent: 400,
  CtoDevHandoff: 800,
  QaCodeDevHandoff: 800,
};
const TYPE_X_JITTER = 140;

const TYPE_GROUP = {
  Decision: "core", Invariant: "core", Concept: "core",
  Entity: "domain",
  Flow: "ops", Engine: "ops", Feature: "ops", Screen: "ops", APIEndpoint: "ops",
  TestKind: "test", TestCase: "test",
  Session: "meta", Wave: "meta", Document: "meta", Lesson: "meta", Node: "meta", Repository: "meta", Idea: "meta",
  Task: "meta", CtoDevHandoff: "meta", QaCodeDevHandoff: "meta",
};
function stableHash(input) {
  let h = 0;
  for (let i = 0; i < input.length; i += 1) {
    h = ((h << 5) - h) + input.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

const TIER_Z_JITTER = 420;

function tierTargetX(node) {
  const center = TYPE_X_CENTER[node.type] ?? 0;
  const jitter = (stableHash((node.id || node.name || '') + ':x') % (TYPE_X_JITTER * 2)) - TYPE_X_JITTER;
  return center + jitter;
}

function tierTargetY(node) {
  const group = TYPE_GROUP[node.type] || 'meta';
  const w = TIER_WEIGHT[group] ?? 0;
  const base = -100 * w;
  const micro = ((stableHash((node.id || '') + ':y') % 120) - 60) * 0.35;
  return base + micro;
}

function tierTargetZ(node) {
  const group = TYPE_GROUP[node.type] || 'meta';
  const center = TIER_Z[group] ?? TIER_Z.meta;
  const jitter = (stableHash((node.id || '') + ':z') % (TIER_Z_JITTER * 2)) - TIER_Z_JITTER;
  return center + jitter;
}

/** Seed positions before simulation so links don’t start from a point cloud blob. */
function seedTierLayout(nodes) {
  nodes.forEach((n) => {
    n.x = tierTargetX(n);
    n.y = tierTargetY(n);
    n.z = tierTargetZ(n);
    n.vx = 0;
    n.vy = 0;
    n.vz = 0;
  });
}
const EDGE_STATIC_COLORS = {
  implements: 'rgba(255, 214, 66, 0.92)',
  depends_on: 'rgba(255, 197, 38, 0.88)',
  enforces: 'rgba(255, 176, 64, 0.9)',
  supersedes: 'rgba(255, 160, 0, 0.86)',
  covers: 'rgba(255, 221, 120, 0.86)',
  discovered_in: 'rgba(255, 204, 95, 0.8)',
  references: 'rgba(255, 193, 7, 0.76)',
  touches: 'rgba(255, 210, 90, 0.72)',
  belongs_to: 'rgba(255, 227, 150, 0.66)',
  relates_to: 'rgba(255, 235, 180, 0.58)',
};
const EDGE_SIGNAL_COLORS = {
  implements: '#ffc107',
  depends_on: '#ffb300',
  enforces: '#ffca28',
  supersedes: '#ff8f00',
  covers: '#ffd54f',
  discovered_in: '#ffcf33',
  references: '#ffb300',
  touches: '#ffca28',
  belongs_to: '#ffd95e',
  relates_to: '#ffdf80',
};

let FG, GRAPH_DATA = {nodes:[], edges:[], links:[]};
let VISIBLE_TYPES = new Set(), VISIBLE_STATUSES = new Set();
/** When false, hide discovered_in (metadata) — default off to declutter. */
let SHOW_METADATA_EDGES = false;
let SHOW_LABELS = false;
let CURRENT_ROOT = null;
let PROJECTS = [];

async function boot() {
  try {
    const res = await fetch('/api/projects');
    PROJECTS = await res.json();
  } catch(e) {
    PROJECTS = [];
  }
  buildProjectSwitcher();
  initGraph();
  const metaChk = document.getElementById('chk-metadata-edges');
  if (metaChk) {
    metaChk.checked = SHOW_METADATA_EDGES;
    metaChk.addEventListener('change', (e) => {
      SHOW_METADATA_EDGES = e.target.checked;
      applyFilters();
    });
  }
  await loadGraph(PROJECTS[0]?.root || null);
}

function buildProjectSwitcher() {
  const sel = document.getElementById('project-switcher');
  sel.innerHTML = '';
  PROJECTS.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.root;
    opt.textContent = p.name;
    sel.appendChild(opt);
  });
  sel.addEventListener('change', e => loadGraph(e.target.value));
}

async function loadGraph(root) {
  document.getElementById('loading').style.display = 'flex';
  CURRENT_ROOT = root;
  try {
    const url = root ? `/api/graph?root=${encodeURIComponent(root)}` : '/api/graph';
    const res = await fetch(url);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    GRAPH_DATA = data;
    initFilters();
    applyFilters();
    if (FG && GRAPH_DATA.nodes && GRAPH_DATA.nodes.length) {
      setTimeout(() => {
        FG.cameraPosition({ x: 400, y: -900, z: 3400 }, { x: 0, y: -1000, z: 0 }, 900);
      }, 80);
    }
    document.getElementById('loading').style.display = 'none';
    if (!GRAPH_DATA.nodes || GRAPH_DATA.nodes.length === 0) {
      document.getElementById('status-left').textContent =
        '0 nodes — graph is empty. This viewer reads .gobp/ on disk (not MCP). ' +
        'Run: python -m gobp.cli init (or add nodes) in this project root.';
    }
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('status-left').textContent = 'Error: ' + e.message;
  }
}

function initFilters() {
  const typeCounts = {}, statusCounts = {};
  GRAPH_DATA.nodes.forEach(n => {
    typeCounts[n.type] = (typeCounts[n.type]||0)+1;
    const s = n.status||'__none__';
    statusCounts[s] = (statusCounts[s]||0)+1;
  });

  VISIBLE_TYPES = new Set(GRAPH_DATA.nodes.map(n=>n.type));
  VISIBLE_STATUSES = new Set(GRAPH_DATA.nodes.map(n=>n.status||'__none__'));

  const tEl = document.getElementById('type-filters');
  tEl.innerHTML = '';
  Object.keys(typeCounts).sort().forEach(t => {
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-type="${t}">
      <span style="color:${TYPE_COLORS[t]||'#fff'}">●</span>
      <span>${t}</span><span class="count">${typeCounts[t]}</span>`;
    label.querySelector('input').addEventListener('change', e => {
      if(e.target.checked) VISIBLE_TYPES.add(t); else VISIBLE_TYPES.delete(t);
      applyFilters();
    });
    tEl.appendChild(label);
  });

  const sEl = document.getElementById('status-filters');
  sEl.innerHTML = '';
  Object.keys(statusCounts).sort().forEach(s => {
    if(s==='__none__') return;
    const label = document.createElement('label');
    label.innerHTML = `<input type="checkbox" checked data-status="${s}">
      <span style="color:${STATUS_COLORS[s]||'#888'}">■</span>
      <span>${s}</span><span class="count">${statusCounts[s]}</span>`;
    label.querySelector('input').addEventListener('change', e => {
      if(e.target.checked) VISIBLE_STATUSES.add(s); else VISIBLE_STATUSES.delete(s);
      applyFilters();
    });
    sEl.appendChild(label);
  });
}

function applyFilters(searchSet=null, hits=null) {
  const nodes = GRAPH_DATA.nodes.filter(n => {
    if(!VISIBLE_TYPES.has(n.type)) return false;
    if(!VISIBLE_STATUSES.has(n.status||'__none__')) return false;
    if(searchSet && !searchSet.has(n.id)) return false;
    return true;
  });
  const ids = new Set(nodes.map(n=>n.id));
  const nodesById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const rawEdges = GRAPH_DATA.links || GRAPH_DATA.edges || [];
  let hiddenMeta = 0;
  const links = rawEdges.filter((e) => {
    if (!ids.has(e.source || e.from) || !ids.has(e.target || e.to)) return false;
    if (!SHOW_METADATA_EDGES && e.type === 'discovered_in') {
      hiddenMeta += 1;
      return false;
    }
    return true;
  }).map(e => {
    const rawSource = e.source || e.from;
    const rawTarget = e.target || e.to;
    const sourceTier = NODE_TIERS[nodesById[rawSource]?.type] || 3;
    const targetTier = NODE_TIERS[nodesById[rawTarget]?.type] || 3;
    const sameTier = sourceTier === targetTier;

    // Signal rule:
    // - Same tier: send "return" pulse (reverse direction)
    // - Different tier: always from lower layer (bigger tier) to upper (smaller tier)
    const signalSource = sameTier
      ? rawTarget
      : (sourceTier > targetTier ? rawSource : rawTarget);
    const signalTarget = sameTier
      ? rawSource
      : (sourceTier > targetTier ? rawTarget : rawSource);
    const tierDelta = Math.abs(sourceTier - targetTier);

    return {
      ...e,
      source: signalSource,
      target: signalTarget,
      __sameTier: sameTier,
      __tierDelta: tierDelta,
    };
  });

  nodes.forEach(n => { n.__hit = hits ? hits.has(n.id) : false; });
  seedTierLayout(nodes);
  FG.graphData({nodes, links});
  document.getElementById('status-left').textContent =
    `${nodes.length} / ${GRAPH_DATA.nodes.length} nodes`;
  const edgeLine = hiddenMeta
    ? `${links.length} edges (${hiddenMeta} metadata hidden)`
    : `${links.length} edges`;
  document.getElementById('status-right').textContent = edgeLine;
}

function initGraph() {
  FG = ForceGraph3D()(document.getElementById('graph-canvas'))
    .backgroundColor('#0a0a0f')
    .nodeLabel(n => n.name)
    .nodeColor(n => n.__hit ? '#ffffff' : (TYPE_COLORS[n.type]||'#888'))
    .nodeOpacity(0.92)
    .nodeVal(n => PRIORITY_SIZE[n.priority]||3)
    .nodeThreeObject(n => {
      if(!SHOW_LABELS) return null;
      return makeSprite(n.name, TYPE_COLORS[n.type]||'#aaa');
    })
    .nodeThreeObjectExtend(false)
    .linkColor(l => EDGE_STATIC_COLORS[l.type] || 'rgba(180, 188, 204, 0.24)')
    .linkWidth(l => ['implements','depends_on','enforces'].includes(l.type)?2.1:1.5)
    // Single pulse per edge: a new cycle starts after reaching destination.
    .linkDirectionalParticles(() => 1)
    .linkDirectionalParticleWidth(l => ['implements','depends_on','enforces'].includes(l.type) ? 5.4 : 4.5)
    .linkDirectionalParticleSpeed(l => {
      // Same tier = slower "return" signal.
      if (l.__sameTier) return 0.0038;
      // Cross-tier upward = faster, scaled by tier gap.
      const delta = l.__tierDelta || 1;
      return Math.min(0.009, 0.0056 + (delta * 0.0012));
    })
    .linkDirectionalParticleColor(l => EDGE_SIGNAL_COLORS[l.type] || '#ffd54f')
    .onNodeClick(n => showDetail(n))
    .onBackgroundClick(() => document.getElementById('detail').classList.remove('visible'));

  FG.d3Force('charge').strength(-420);
  const linkForce = FG.d3Force('link');
  linkForce.distance((l) => {
    const t = l.type || '';
    if (t === 'discovered_in') return 20;
    if (t === 'implements' || t === 'depends_on') return 150;
    if (t === 'relates_to') return 100;
    if (t === 'belongs_to') return 80;
    const sourceTier = NODE_TIERS[(l.source && l.source.type) || 'Node'] || 3;
    const targetTier = NODE_TIERS[(l.target && l.target.type) || 'Node'] || 3;
    const delta = Math.abs(sourceTier - targetTier);
    return 120 + (delta * 40);
  });
  if (typeof linkForce.strength === 'function') {
    linkForce.strength(() => 0.12);
  }
  FG.d3Force('x', d3.forceX((n) => tierTargetX(n)).strength(0.15));
  FG.d3Force('y', d3.forceY((n) => tierTargetY(n)).strength(0.3));
  if (typeof d3.forceZ === 'function') {
    FG.d3Force('z', d3.forceZ((n) => tierTargetZ(n)).strength(0.08));
  }
  FG.d3Force('collide', d3.forceCollide((n) => (PRIORITY_SIZE[n.priority] || 3) * 8 + 32).strength(0.92));
  FG.d3VelocityDecay(0.28);
  if (typeof FG.cooldownTicks === 'function') {
    FG.cooldownTicks(450);
  }
}

function makeSprite(text, color) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  const fs = 32;
  ctx.font = `${fs}px "Courier New", monospace`;
  const w = ctx.measureText(text).width;
  canvas.width = w+16; canvas.height = fs+8;
  ctx.font = `${fs}px "Courier New", monospace`;
  ctx.fillStyle = color;
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 8, canvas.height/2);
  const tex = new THREE.CanvasTexture(canvas);
  const mat = new THREE.SpriteMaterial({map:tex, transparent:true, depthWrite:false});
  const sprite = new THREE.Sprite(mat);
  const aspect = canvas.width/canvas.height;
  sprite.scale.set(aspect*4, 4, 1);
  return sprite;
}

let mcpTab = 'cli';

async function toggleMCPPanel() {
  const panel = document.getElementById('mcp-panel');
  const detail = document.getElementById('detail');

  if (panel.style.display === 'none' || panel.style.display === '') {
    panel.style.display = 'block';
    detail.classList.remove('visible');

    const cfgUrl = CURRENT_ROOT
      ? `/api/config?root=${encodeURIComponent(CURRENT_ROOT)}`
      : '/api/config';
    try {
      const cfg = await fetch(cfgUrl).then(r => r.json());
      document.getElementById('mcp-root').value = cfg.project_root || '';
      document.getElementById('mcp-name').value = cfg.project_name || '';
      document.getElementById('mcp-db').value = cfg.suggested_db || '';
      document.getElementById('mcp-python').value = cfg.python_path || '';
      document.getElementById('mcp-dbhost').value = cfg.db_host || 'postgresql://postgres:***@localhost';
      generateMCP();
    } catch (e) {
      console.error('Failed to load config:', e);
    }
  } else {
    panel.style.display = 'none';
  }
}

function getMCPKey() {
  const name = document.getElementById('mcp-name').value || 'project';
  return 'gobp-' + name.toLowerCase().replace(/[^a-z0-9]/g, '-');
}

function switchMCPTab(tab) {
  mcpTab = tab;
  document.querySelectorAll('.mcp-tab').forEach((el) => {
    el.classList.toggle('active', el.getAttribute('data-tab') === tab);
  });
  generateMCP();
}

function generateMCP() {
  const root = document.getElementById('mcp-root').value;
  const name = document.getElementById('mcp-name').value;
  const db = document.getElementById('mcp-db').value;
  const python = document.getElementById('mcp-python').value;
  const dbhost = document.getElementById('mcp-dbhost').value;
  const key = getMCPKey();

  document.getElementById('mcp-key-preview').textContent = 'MCP KEY: ' + key;

  const serverObj = {
    type: 'stdio',
    command: python,
    args: ['-m', 'gobp.mcp.server'],
    env: {
      GOBP_PROJECT_ROOT: root,
      GOBP_DB_URL: dbhost + '/' + db
    }
  };

  const cursorObj = { ...serverObj };
  delete cursorObj.type;

  let output = '';
  if (mcpTab === 'cli') {
    output = JSON.stringify({ mcpServers: { [key]: serverObj } }, null, 2);
  } else if (mcpTab === 'cursor') {
    output = JSON.stringify({ mcpServers: { [key]: cursorObj } }, null, 2);
  } else {
    output = `# Add ${key} to ~/.claude.json
$server = [PSCustomObject]@{
  type = "stdio"
  command = "${python}"
  args = @("-m", "gobp.mcp.server")
  env = [PSCustomObject]@{
    GOBP_PROJECT_ROOT = "${root}"
    GOBP_DB_URL = "${dbhost}/${db}"
  }
}
# Run this script to add the MCP server automatically`;
  }

  document.getElementById('mcp-code').textContent = output;
}

function copyMCP() {
  const text = document.getElementById('mcp-code').textContent;
  navigator.clipboard.writeText(text);
  const btn = document.getElementById('mcp-copy-btn');
  btn.textContent = 'Copied!';
  setTimeout(() => { btn.textContent = 'Copy'; }, 2000);
}

function showDetail(node) {
  const mcpPanel = document.getElementById('mcp-panel');
  if (mcpPanel) mcpPanel.style.display = 'none';
  const out = [], inc = [];
  const edges = GRAPH_DATA.edges||GRAPH_DATA.links||[];
  edges.forEach(e => {
    const f = e.from||e.source, t = e.to||e.target;
    if(f===node.id) out.push({type:e.type,id:t});
    if(t===node.id) inc.push({type:e.type,id:f});
  });
  const nodesById = {};
  GRAPH_DATA.nodes.forEach(n => nodesById[n.id]=n);

  const skip = new Set(['id','type','name','status','__hit','__searchHit',
    'x','y','z','vx','vy','vz','index','fx','fy','fz']);
  const fields = Object.entries(node).filter(([k])=>!skip.has(k)&&node[k]!=null);
  const primaryOrder = ['priority','description','topic','group','source_path','spec_source','created','updated'];
  const primary = [];
  const raw = [];
  fields.forEach(([k,v]) => {
    const isObj = Array.isArray(v) || (typeof v === 'object');
    const text = isObj ? '' : String(v);
    const isShortScalar = !isObj && text.length <= 220;
    if (primaryOrder.includes(k) || isShortScalar) primary.push([k,v]);
    else raw.push([k,v]);
  });
  primary.sort((a,b) => {
    const ia = primaryOrder.indexOf(a[0]);
    const ib = primaryOrder.indexOf(b[0]);
    if (ia === -1 && ib === -1) return a[0].localeCompare(b[0]);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  let html = `<div class="node-type">${node.type}</div>
    <div class="node-id">${node.id}</div>
    <div class="node-name">${esc(node.name)}</div>`;
  if(node.status) html += `<div class="field"><div class="field-label">Status</div>
    <div class="field-value" style="color:${STATUS_COLORS[node.status]||'#888'}">${node.status}</div></div>`;
  primary.forEach(([k,v]) => {
    let val = Array.isArray(v) ? v.map(i=>`• ${esc(String(i))}`).join('<br>')
            : typeof v==='object' ? `<pre style="font-size:9px;color:var(--text-dim);white-space:pre-wrap">${esc(JSON.stringify(v,null,2))}</pre>`
            : esc(String(v));
    html += `<div class="field"><div class="field-label">${k.replace(/_/g,' ')}</div>
      <div class="field-value">${val}</div></div>`;
  });
  if(raw.length) {
    html += `<details class="relations"><summary style="cursor:pointer;color:var(--amber-soft);font-size:11px;">Show raw fields (${raw.length})</summary>`;
    raw.forEach(([k,v]) => {
      const val = Array.isArray(v) ? v.map(i=>`• ${esc(String(i))}`).join('<br>')
              : typeof v==='object' ? `<pre style="font-size:9px;color:var(--text-dim);white-space:pre-wrap">${esc(JSON.stringify(v,null,2))}</pre>`
              : esc(String(v));
      html += `<div class="field"><div class="field-label">${k.replace(/_/g,' ')}</div>
        <div class="field-value">${val}</div></div>`;
    });
    html += `</details>`;
  }
  if(out.length) {
    html += '<div class="relations"><h4>→ Outgoing</h4>';
    out.slice(0,30).forEach(e => {
      const name = nodesById[e.id]?.name||e.id;
      html += `<div class="rel-item" data-id="${e.id}">
        <span class="rel-verb">${e.type}</span>
        <span class="rel-target">${esc(name)}</span></div>`;
    });
    html += '</div>';
  }
  if(inc.length) {
    html += '<div class="relations"><h4>← Incoming</h4>';
    inc.slice(0,30).forEach(e => {
      const name = nodesById[e.id]?.name||e.id;
      html += `<div class="rel-item" data-id="${e.id}">
        <span class="rel-verb">${e.type}</span>
        <span class="rel-target">${esc(name)}</span></div>`;
    });
    html += '</div>';
  }
  html += `<div class="gobp-query">gobp(query="get: ${node.id} brief=true")</div>`;

  const content = document.getElementById('detail-content');
  content.innerHTML = html;
  document.getElementById('detail').classList.add('visible');

  content.querySelectorAll('.rel-item[data-id]').forEach(el => {
    el.addEventListener('click', () => {
      const n = GRAPH_DATA.nodes.find(n=>n.id===el.dataset.id);
      if(n) { showDetail(n); focusNode(n); }
    });
  });

  focusNode(node);
}

function focusNode(n) {
  if (n.x == null && n.y == null && n.z == null) return;
  const cx = n.x || 0, cy = n.y || 0, cz = n.z || 0;
  const d = 1800;
  const dist = Math.hypot(cx, cy, cz) || 1;
  const r = 1 + d / dist;
  FG.cameraPosition({ x: cx * r, y: cy * r, z: cz * r }, n, 800);
}

function esc(s) {
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.getElementById('btn-core').addEventListener('click', () => {
  document.querySelectorAll('#type-filters input').forEach(cb => {
    cb.checked = CORE_TYPES.has(cb.dataset.type);
    if(cb.checked) VISIBLE_TYPES.add(cb.dataset.type); else VISIBLE_TYPES.delete(cb.dataset.type);
  });
  applyFilters();
});
document.getElementById('btn-all').addEventListener('click', () => {
  document.querySelectorAll('#type-filters input').forEach(cb => {
    cb.checked = true; VISIBLE_TYPES.add(cb.dataset.type);
  });
  applyFilters();
});
document.getElementById('btn-labels').addEventListener('click', () => {
  SHOW_LABELS = !SHOW_LABELS; FG.refresh();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  FG.cameraPosition({ x: 400, y: -900, z: 3400 }, { x: 0, y: -1000, z: 0 }, 900);
});
document.getElementById('btn-refresh').addEventListener('click', () => {
  loadGraph(CURRENT_ROOT);
});
document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toLowerCase();
  if(!q) { applyFilters(); return; }
  const hits = new Set();
  GRAPH_DATA.nodes.forEach(n => {
    if(n.id.toLowerCase().includes(q)||(n.name||'').toLowerCase().includes(q)) hits.add(n.id);
  });
  const neighbors = new Set(hits);
  (GRAPH_DATA.edges||GRAPH_DATA.links||[]).forEach(e => {
    const f=e.from||e.source, t=e.to||e.target;
    if(hits.has(f)) neighbors.add(t);
    if(hits.has(t)) neighbors.add(f);
  });
  applyFilters(neighbors, hits);
});

boot();
</script>
