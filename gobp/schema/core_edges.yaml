schema_version: "2.0"
version: "2.0"
schema_name: "gobp_edge_policy_v1"

edge_types:
  discovered_in:
    description: "Node duoc tao ra trong session nao (provenance)"
    traverse_priority: skip
    reason_required: false
    reason_template: null
  depends_on:
    description: "from can to de dung vung / hoat dong dung"
    traverse_priority: high
    reason_required: false
    reason_template: "{from_name} can {to_name} de hoat dong dung."
  implements:
    description: "from hien thuc dac ta / contract cua to"
    traverse_priority: high
    reason_required: false
    reason_template: "{from_name} hien thuc dac ta {to_name}."
  enforces:
    description: "Constraint ap rang buoc len Code hoac Test"
    traverse_priority: medium
    reason_required: true
    reason_template: "{from_name} rang buoc {to_name}."
  covers:
    description: "Test bao phu Code / Constraint / Knowledge"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} kiem chung {to_name}."
  # Legacy edge types kept for backward compatibility with existing data/tests.
  relates_to:
    description: "General relation (legacy fallback)"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} lien quan den {to_name}."
  references:
    description: "Reference relation"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} tham chieu {to_name}."
  validated_by:
    description: "Node duoc validate boi test/engine"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} duoc xac thuc boi {to_name}."
  of_kind:
    description: "TestCase thuoc TestKind"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} thuoc loai {to_name}."
  belongs_to:
    description: "Node thuoc group/suite"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} thuoc {to_name}."
  supersedes:
    description: "Node moi thay the node cu"
    traverse_priority: medium
    reason_required: false
    reason_template: "{from_name} thay the {to_name}."
  triggers:
    description: "Node kich hoat node khac"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} kich hoat {to_name}."
  produces:
    description: "Node tao ra output node khac"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} tao ra {to_name}."
  specified_in:
    description: "Node duoc dac ta trong document"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} duoc dac ta trong {to_name}."
  affects:
    description: "Node anh huong den node khac"
    traverse_priority: low
    reason_required: false
    reason_template: "{from_name} anh huong {to_name}."

role_groups:
  Knowledge:
    node_types: [Document, Spec, Idea, Lesson, LessonRule, LessonDev, LessonQA, LessonCTO]
  Code:
    node_types: [Flow, Feature, Engine, UseCase, Command, Entity, ValueObject, Aggregate, Repository, APIContract, APIEndpoint, Module, Class, Function, Interface, ErrorCase, ErrorDomain]
  Constraint:
    node_types: [Invariant, BusinessRule, Precondition, Postcondition, Policy]
  Test:
    node_types: [TestSuite, TestKind, TestCase]
  Meta:
    node_types: [Session, Wave, Task, Reflection]

matrix:
  Knowledge:
    Knowledge: depends_on
    Code: implements
    Constraint: depends_on
    Test: covers
    Meta: discovered_in
  Code:
    Knowledge: implements
    Code: depends_on
    Constraint: enforces
    Test: covers
    Meta: discovered_in
  Constraint:
    Knowledge: depends_on
    Code: enforces
    Meta: discovered_in
  Test:
    Knowledge: covers
    Code: covers
    Constraint: enforces
    Test: depends_on
    Meta: discovered_in
  Meta:
    Knowledge: depends_on
    Meta: discovered_in
