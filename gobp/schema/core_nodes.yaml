# GoBP Core Node Types
# Reference: docs/SCHEMA.md section 2
# Schema version: 1.0

schema_version: "2.0"
schema_name: "gobp_core"

node_types:

  Node:
    description: "Generic container for any entity, feature, tool, concept"
    id_prefix: "node"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.node:[0-9]+|node:[a-z][a-z0-9_]*)$'
      type:
        type: "str"
      name:
        type: "str"
      status:
        type: "enum"
        enum_values: ["DRAFT", "ACTIVE", "DEPRECATED", "ARCHIVED"]
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      subtype:
        type: "str"
      description:
        type: "str"
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      tags:
        type: "list[str]"
        default: []
      custom_fields:
        type: "dict"
        default: {}
      code_refs:
        type: "list[dict]"
        default: []
        description: "Code files implementing or related to this node"
      invariants:
        type: "list[str]"
        default: []
        description: "Hard constraints that must always be true for this node"

    constraints:
      - "created <= updated"

  Idea:
    description: "Unstructured brainstorm captured from conversation"
    id_prefix: "idea"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.idea:[0-9]+|idea:i[0-9]{3,})$'
      type:
        type: "str"
        enum_values: ["Idea"]
      raw_quote:
        type: "str"
      interpretation:
        type: "str"
      subject:
        type: "str"
      maturity:
        type: "enum"
        enum_values: ["RAW", "REFINED", "DISCUSSED", "LOCKED", "DEPRECATED"]
      confidence:
        type: "enum"
        enum_values: ["low", "medium", "high"]
      session_id:
        type: "node_ref"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      supersedes:
        type: "node_ref"
      context_notes:
        type: "str"
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      ceo_verified:
        type: "bool"
        default: false
      status:
        type: "enum"
        enum_values: ["ACTIVE", "SUPERSEDED"]
        default: "ACTIVE"
      code_refs:
        type: "list[dict]"
        default: []
        description: "Code files implementing or related to this node"
      invariants:
        type: "list[str]"
        default: []
        description: "Hard constraints that must always be true for this node"

  Decision:
    description: "Locked authoritative knowledge"
    id_prefix: "dec"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.core\.[0-9]{8}|(?:core)\.dec:[0-9]+|dec:d[0-9]{3,})$'
      type:
        type: "str"
        enum_values: ["Decision"]
      topic:
        type: "str"
      what:
        type: "str"
      why:
        type: "str"
      status:
        type: "enum"
        enum_values: ["LOCKED", "SUPERSEDED", "WITHDRAWN"]
      locked_at:
        type: "timestamp"
      locked_by:
        type: "list[str]"
      session_id:
        type: "node_ref"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      alternatives_considered:
        type: "list[dict]"
        default: []
      risks:
        type: "list[str]"
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      blocks:
        type: "list[node_ref]"
      supersedes:
        type: "node_ref"
      related_ideas:
        type: "list[node_ref]"
      code_refs:
        type: "list[dict]"
        default: []
        description: "Code files implementing or related to this node"
      invariants:
        type: "list[str]"
        default: []
        description: "Hard constraints that must always be true for this node"

  Session:
    description: "Record of one AI working session"
    id_prefix: "session"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^((?:meta)\.session\.[0-9]{4}-[0-9]{2}-[0-9]{2}\.[a-f0-9]{9}|(?:meta)\.session:[0-9]{4}-[0-9]{2}-[0-9]{2}_[a-f0-9]{9}|session:[0-9]{4}-[0-9]{2}-[0-9]{2}.*)$'
      type:
        type: "str"
        enum_values: ["Session"]
      actor:
        type: "str"
      started_at:
        type: "timestamp"
      goal:
        type: "str"
      status:
        type: "enum"
        enum_values: ["IN_PROGRESS", "COMPLETED", "INTERRUPTED", "FAILED"]
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      ended_at:
        type: "timestamp"
      outcome:
        type: "str"
      nodes_touched:
        type: "list[node_ref]"
        default: []
      decisions_locked:
        type: "list[node_ref]"
        default: []
      pending:
        type: "list[str]"
        default: []
      tokens_used:
        type: "int"
      human_present:
        type: "bool"
      handoff_notes:
        type: "str"
      role:
        type: "enum"
        enum_values: ["observer", "contributor", "admin"]
        default: "contributor"
        description: "Agent role for this session (audit trail only)"

  Document:
    description: "Pointer to external doc file with metadata"
    id_prefix: "doc"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.meta\.[a-f0-9]{6}|(?:meta)\.doc:[A-Za-z0-9_.\-]+|doc:.+)$'
      type:
        type: "str"
        enum_values: ["Document"]
      name:
        type: "str"
      source_path:
        type: "str"
      content_hash:
        type: "str"
        pattern: "^sha256:[a-f0-9]{64}$"
      registered_at:
        type: "timestamp"
      last_verified:
        type: "timestamp"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      sections:
        type: "list[dict]"
        default: []
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      tags:
        type: "list[str]"
        default: []
      owned_by:
        type: "str"
      phase:
        type: "int"
      status:
        type: "enum"
        enum_values: ["ACTIVE", "STALE", "MISSING", "DEPRECATED"]
        default: "ACTIVE"
      code_refs:
        type: "list[dict]"
        default: []
        description: "Code files implementing or related to this node"
      invariants:
        type: "list[str]"
        default: []
        description: "Hard constraints that must always be true for this node"

  Lesson:
    description: "Something learned from experience"
    id_prefix: "lesson"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.lesson:[0-9]+|lesson:ll[0-9]{3,})$'
      type:
        type: "str"
        enum_values: ["Lesson"]
      title:
        type: "str"
      trigger:
        type: "str"
      what_happened:
        type: "str"
      why_it_matters:
        type: "str"
      mitigation:
        type: "str"
      severity:
        type: "enum"
        enum_values: ["low", "medium", "high", "critical"]
      captured_in_session:
        type: "node_ref"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      related_nodes:
        type: "list[node_ref]"
        default: []
      related_ideas:
        type: "list[node_ref]"
        default: []
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      verified_count:
        type: "int"
        default: 1
      last_applied:
        type: "timestamp"
      tags:
        type: "list[str]"
        default: []

  Concept:
    description: "A defined concept stored for AI orientation and framework understanding"
    id_prefix: "concept"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.core\.[0-9]{8}|(?:core)\.con:[0-9]+|concept:.+)$'
      type:
        type: "str"
        enum_values: ["Concept"]
      name:
        type: "str"
      definition:
        type: "str"
        description: "What this concept means"
      usage_guide:
        type: "str"
        description: "How AI should use this concept"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      applies_to:
        type: "list[str]"
        default: []
      seed_values:
        type: "list[str]"
        default: []
      priority:
        type: "enum"
        enum_values: ["critical", "high", "medium", "low"]
        default: "medium"
        description: "Importance level: critical=must have, high=important, medium=standard, low=nice to have"
      extensible:
        type: "bool"
        default: true
      tags:
        type: "list[str]"
        default: []

  TestKind:
    description: "A category of software test with template and seed examples"
    id_prefix: "testkind"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.test\.[0-9]{8}|(?:test)\.kind:[0-9]+|testkind:.+)$'
      type:
        type: "str"
        enum_values: ["TestKind"]
      name:
        type: "str"
      group:
        type: "enum"
        enum_values: ["functional", "non_functional", "security", "process"]
      scope:
        type: "enum"
        enum_values: ["universal", "platform", "project"]
      description:
        type: "str"
      template:
        type: "dict"
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      platform:
        type: "str"
        default: null
      seed_examples:
        type: "list[str]"
        default: []
      extensible:
        type: "bool"
        default: true
      tags:
        type: "list[str]"
        default: []

  TestCase:
    description: "A specific test instance linked to a TestKind and a feature/node"
    id_prefix: "tc"
    parent: null

    required:
      id:
        type: "str"
        pattern: '^([a-z0-9_]{1,40}\.test\.(unit|integration|e2e|smoke|performance|security|acceptance|regression|compatibility|contract|exploratory|accessibility)\.[0-9]{8}|(?:test)\.case:[0-9]+|tc:.+)$'
      type:
        type: "str"
        enum_values: ["TestCase"]
      name:
        type: "str"
      kind_id:
        type: "node_ref"
        description: "TestKind this test belongs to"
      covers:
        type: "node_ref"
        description: "Feature/Node being tested"
      status:
        type: "enum"
        enum_values: ["DRAFT", "READY", "PASSING", "FAILING", "SKIPPED", "DEPRECATED"]
      priority:
        type: "enum"
        enum_values: ["low", "medium", "high", "critical"]
      created:
        type: "timestamp"
      updated:
        type: "timestamp"

    optional:
      given:
        type: "str"
      when:
        type: "str"
      then:
        type: "str"
      scenario:
        type: "str"
        description: "Alternative to Given/When/Then for non-BDD kinds"
      automated:
        type: "bool"
        default: false
      code_ref:
        type: "str"
        description: "e.g. test/auth_test.dart#login_valid"
      tags:
        type: "list[str]"
        default: []

  Engine:
    description: "Business logic engine (TrustEngine, LevelEngine, etc.)"
    id_prefix: "engine"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.ops\.[0-9]{8}|(?:ops)\.engine:[0-9]+|engine:.+)$'}
      type: {type: str, enum_values: ["Engine"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      invariants: {type: "list[str]", default: []}
      spec_source: {type: str}

  Flow:
    description: "User flow or process flow (registration, auth, etc.)"
    id_prefix: "flow"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.ops\.[0-9]{8}|(?:ops)\.flow:[0-9]+|flow:.+)$'}
      type: {type: str, enum_values: ["Flow"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      invariants: {type: "list[str]", default: []}
      spec_source: {type: str}

  Entity:
    description: "Domain entity (Traveller, Place, Moment, etc.)"
    id_prefix: "entity"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.domain\.[0-9]{8}|(?:domain)\.entity:[0-9]+|entity:.+)$'}
      type: {type: str, enum_values: ["Entity"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      invariants: {type: "list[str]", default: []}
      spec_source: {type: str}

  Feature:
    description: "Product feature (user-facing capability)"
    id_prefix: "feat"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.ops\.[0-9]{8}|(?:ops)\.feat:[0-9]+|feat:.+)$'}
      type: {type: str, enum_values: ["Feature"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      invariants: {type: "list[str]", default: []}
      spec_source: {type: str}

  Invariant:
    description: "Hard constraint that must always be true"
    id_prefix: "inv"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.core\.[0-9]{8}|(?:core)\.inv:[0-9]+|inv:.+)$'}
      type: {type: str, enum_values: ["Invariant"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "high"}
      description: {type: str}
      rule: {type: str}
      spec_source: {type: str}

  Screen:
    description: "UI screen or page"
    id_prefix: "screen"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.ops\.[0-9]{8}|(?:ops)\.screen:[0-9]+|screen:.+)$'}
      type: {type: str, enum_values: ["Screen"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      spec_source: {type: str}

  APIEndpoint:
    description: "REST/RPC API endpoint"
    id_prefix: "api"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.ops\.[0-9]{8}|(?:ops)\.api:[0-9]+|api:.+)$'}
      type: {type: str, enum_values: ["APIEndpoint"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}
      code_refs: {type: "list[dict]", default: []}
      spec_source: {type: str}

  Repository:
    description: "Code repository (flutter, backend, etc.)"
    id_prefix: "repo"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.repo:[0-9]+|repo:.+)$'}
      type: {type: str, enum_values: ["Repository"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "high"}
      description: {type: str}
      url: {type: str}

  Wave:
    description: "Build wave / sprint"
    id_prefix: "wave"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.wave:[0-9]+|wave:.+)$'}
      type: {type: str, enum_values: ["Wave"]}
      name: {type: str}
      status: {type: enum, enum_values: ["DRAFT", "ACTIVE", "COMPLETED", "DEPRECATED"]}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      priority: {type: enum, enum_values: ["critical","high","medium","low"], default: "medium"}
      description: {type: str}

  Task:
    description: "Work item for AI agent communication queue"
    id_prefix: "task"
    required:
      id: {type: str, pattern: '^([a-z0-9_]{1,40}\.meta\.[0-9]{8}|(?:meta)\.task:[0-9]+|task:.+)$'}
      type: {type: str, enum_values: ["Task"]}
      name: {type: str}
      assignee: {type: enum, enum_values: ["cursor", "claude-cli", "haiku", "any"], default: "cursor"}
      status: {type: enum, enum_values: ["PENDING", "RUNNING", "DONE", "FAILED", "BLOCKED"], default: "PENDING"}
      created: {type: timestamp}
      updated: {type: timestamp}
    optional:
      session_id: {type: node_ref}
      brief_path: {type: str}
      wave: {type: str}
      priority: {type: enum, enum_values: ["critical", "high", "medium", "low"], default: "medium"}
      error: {type: str}
      result_summary: {type: str}
